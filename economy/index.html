<div id="subpages" class="grid md:grid-cols-2 gap-3 mt-6">
  <p class="text-white/50">Loading chapters...</p>
</div>

<script>
async function loadChapters() {
  const user = 'infome2ckr-sketch';
  const repo = 'upsc-for-absolute-beginners';
  const path = 'economy/monetary-economy'; // <-- YOUR ACTUAL FOLDER
  
  const box = document.getElementById('subpages');
  
  try {
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`);
    if(!res.ok) throw new Error('GitHub API error');
    
    const files = await res.json();
    
    const chapters = files
      .filter(f => f.type === 'file' && f.name.endsWith('.html') && f.name !== 'index.html')
      .sort((a,b) => a.name.localeCompare(b.name));
    
    if(chapters.length === 0) {
      box.innerHTML = '<p class="text-white/50">No chapters yet. Add .html files to this folder.</p>';
      return;
    }
    
    box.innerHTML = '';
    chapters.forEach(f => {
      const cleanName = f.name.replace('.html','')
        .replace(/^ch\d+_?/i,'') // removes ch01_
        .replace(/[-_]/g,' ')
        .replace(/\b\w/g, c => c.toUpperCase());
      
      const a = document.createElement('a');
      a.href = f.name;
      a.className = 'block p-4 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 transition';
      a.innerHTML = `
        <div class="flex items-center gap-3">
          <span class="text-amber-300">→</span>
          <div>
            <div class="font-medium">${cleanName || 'Chapter'}</div>
            <div class="text-xs text-white/50">${f.name}</div>
          </div>
        </div>`;
      box.appendChild(a);
    });
    
  } catch(err) {
    console.error(err);
    box.innerHTML = `<p class="text-red-400">Failed to load. Check: 1) folder name is correct, 2) files end with .html, 3) you're online.</p>`;
  }
}
loadChapters();
</script>
